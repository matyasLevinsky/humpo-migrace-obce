name: Deploy shinylive app to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "shiny_app/**"
      - "data/processed/humpo_obce_mesicni.csv"
      - "data/processed/humpo_obce_latest.csv"
      - ".github/workflows/deploy-shinylive.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::shiny
            any::dplyr
            any::ggplot2
            any::scales
            any::readr
            any::shinylive
          working-directory: shiny_app

      - name: Prepare compact app data (rds) from the processed CSV
        working-directory: shiny_app
        run: Rscript prepare_data.R

      - name: Export app to static shinylive site
        run: Rscript -e 'shinylive::export("shiny_app", "docs")'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
